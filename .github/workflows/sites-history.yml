name: Sites History CI
on:
  schedule:
    # Cron is best-effort on GitHub Actions free tier (often delayed/skipped
    # by 30–90 min). Each run takes multiple samples internally via
    # SAMPLES_PER_RUN/SAMPLE_INTERVAL_SECONDS in record-sites.mjs, so the
    # effective sample rate is much higher than this cron interval.
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Prevent overlapping runs from racing on the state file.
concurrency:
  group: sites-history
  cancel-in-progress: false

jobs:
  record:
    name: Record sites snapshot
    runs-on: ubuntu-22.04
    # Long enough for a full SAMPLES_PER_RUN × SAMPLE_INTERVAL_SECONDS loop
    # plus checkout/install/commit overhead. Default of 360 min is wasteful.
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Record sample
        run: node scripts/record-sites.mjs

      - name: Commit if changed
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          if git diff --quiet -- history/sites-state.json; then
            echo "No changes to commit."
            exit 0
          fi
          # Pull --rebase to avoid races with concurrent commits from the
          # other every-5-min workflows (Uptime CI, Models History CI).
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add history/sites-state.json
          git commit -m "📊 Record sites snapshot [skip ci]"
          for i in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed, rebasing and retrying..."
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
          done
          echo "Push failed after retries"
          exit 1
