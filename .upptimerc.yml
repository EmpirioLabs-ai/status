# See https://upptime.js.org/docs/configuration for full docs

owner: EmpirioLabs-ai
repo: status

sites:
  - name: Main Site
    url: https://empiriolabs.ai
    expectedStatusCodes: [200, 301, 302, 308]
  - name: Webflow Staging
    url: https://empiriolabs-ai.webflow.io
  - name: Docs
    url: https://docs.empiriolabs.ai
  - name: Docs (Fern Origin)
    url: https://empiriolabs-ai.docs.buildwithfern.com

status-website:
  cname: status.empiriolabs.ai
  baseUrl: /
  name: EmpirioLabs AI Status
  introTitle: "**Live status** for EmpirioLabs AI services"
  introMessage: >
    This is the live operational status of EmpirioLabs AI's customer-facing
    services. Powered by [Upptime](https://upptime.js.org).
  navbar:
    - title: Status
      href: /
    - title: Main Site
      href: https://empiriolabs.ai
    - title: Docs
      href: https://docs.empiriolabs.ai
    - title: GitHub
      href: https://github.com/EmpirioLabs-ai/status
  logoUrl: https://docs.empiriolabs.ai/_next/image?url=%2Fdocs%2Fassets%2Flogo.png&w=384&q=75
  theme: dark

assignees:
  - EmpirioLabs-ai

# How often to run uptime checks (cron)
workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updates: "0 3 * * *"
  updateTemplate: "0 0 * * 0"
  uptime: "*/5 * * * *"

# Open an incident issue when a site goes down
notifications:
  - type: github
    label: status
